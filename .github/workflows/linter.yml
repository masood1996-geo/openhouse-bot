---
name: Lint Code Base

on:
  push:
    branches:
      - 'main'
  pull_request:

jobs:
  build:
    name: Lint Code Base
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -e . || true
          pip install pylint bandit

      - name: Security Scan (Bandit)
        run: bandit -r openhouse/ -ll || true

      - name: Lint with pylint
        run: pylint openhouse/ --exit-zero
